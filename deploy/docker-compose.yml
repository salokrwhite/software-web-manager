version: "3.9"

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: swmanager
      MYSQL_USER: swm
      MYSQL_PASSWORD: swm
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  minio:
    image: minio/minio:RELEASE.2024-01-18T22-51-28Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  nginx:
    image: nginx:1.27
    ports:
      - "8088:80"
    volumes:
      - ../data/files:/usr/share/nginx/html/files:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: swm:swm@tcp(mysql:3306)/swmanager?charset=utf8mb4&parseTime=true&loc=Local&multiStatements=true
      STORAGE_DRIVER: local
      LOCAL_STORAGE_PATH: /data/files
      LOCAL_PUBLIC_BASE_URL: http://localhost:8088/files
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: swm
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_USE_PATH_STYLE: "true"
      RUN_MIGRATIONS: "true"
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - minio
    volumes:
      - ../data/files:/data/files

  web:
    build:
      context: ..
      dockerfile: web/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  mysql_data:
  minio_data:
